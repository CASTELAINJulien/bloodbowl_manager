services:
  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    container_name: bb_caddy
    restart: unless-stopped
    ports:
      # Accès local : http://localhost:8080
      - "${HTTP_PORT:-8080}:80"
    environment:
      - SITE_ADDRESS=:80
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - bbnet

  backend:
    build: ./backend
    container_name: bb_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    volumes:
      # Persiste la base SQLite dans un volume Docker nommé (évite les
      # soucis de permissions des bind mounts Windows)
      - bb_data:/app/data
    networks:
      - bbnet
    expose:
      - "3001"

volumes:
  caddy_data:
  caddy_config:
  bb_data:

networks:
  bbnet:
    driver: bridge
